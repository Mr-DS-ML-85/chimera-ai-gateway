# CrowdSec Log Acquisition Configuration
# Defines which logs to watch and how to parse them
#
# Documentation: https://docs.crowdsec.net/docs/observability/acquisition

# Nginx access logs - primary HTTP attack detection
filenames:
  - /var/log/nginx/access.log

# Apply nginx parser to extract HTTP request details
labels:
  type: nginx

# CrowdSec needs to know the format for parsing
# The nginx log format in nginx.conf is configured to output standard combined format
# which crowdsecurity/nginx parser handles well

# Optional: Watch error logs for additional detection
filenames:
  - /var/log/nginx/error.log
labels:
  type: nginx_error

# Watch uvicorn/gateway logs if direct access is used
filenames:
  - /host/var/log/nginx/access.log
labels:
  type: nginx

