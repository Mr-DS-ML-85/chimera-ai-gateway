# CrowdSec Firewall Bouncer Configuration
# Applies ban decisions via iptables

# API Configuration
api_url: http://localhost:6060
api_key: ${CROWDSEC_API_KEY:-changeme}
api_version: v1

# Firewall configuration
piddir: /var/run
log_dir: /var/log/crowdsec
log_level: info

# Bouncer settings
disable_ipv6: true
only_trusted_ips: false

# Update frequency - how often to check for new decisions
update_frequency: 10s

# IPTABLES configuration
iptables_chain: CROWDSEC
prefer_source_ip: false

# Blacklists
blacklists_ipv4: []
blacklists_ipv6: []

# Cleanup on exit
clean_on_exit: true