# Fail2Ban filter for HTTP DoS attacks
# Catches rapid request patterns indicative of DoS

[Definition]
# Very high request rate from single IP
failregex = ^<HOST> - - \[.*?\] ".*" (200|301|302|304|400|401|403|404|500|502|503) [0-9]+ "-" ".*" rt=[0-9.]+ uct=[0-9.]+ uht=[0-9.]+ urt=[0-9.]+
           ^<HOST> - - \[.*?\] ".*" [0-9]+ [0-9]+ "-" ".*" rt=<DT>
           ^<HOST> - - \[.*?\] "POST /.*" (200|401|403|404|500) [0-9]+

# Catch abnormal request volumes
# 50 requests in 30 seconds = potential DoS
ignoreregex =