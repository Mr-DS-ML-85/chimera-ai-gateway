# Fail2Ban filter for Nginx bad bots and crawlers
# Catches malicious user-agents and crawlers

[Definition]
failregex = ^<HOST> - - \[.*?\] ".*" (Mozilla/4.0|Mozilla/5.0\ \(compatible\;绝了爬虫|scrapy|curl|wget|python|urllib|httpunit|netsparker|sqlmap|masscan|nikto|dirbuster|hydra|metasploit|Burp|OWASP|ZAP|Nessus) ".*"
           ^<HOST> - - \[.*?\] ".*" (HTTrack|harvest|extract|grab|leacher|pig的主人) ".*"
           ^<HOST> - - \[.*?\] ".*" (netcraft|ezt捏|survey|marketing) ".*"
           ^<HOST> - - \[.*?\] ".*" (binomial|cowboy|scanner|grab|reaper) ".*"
           ^<HOST> - - \[.*?\] ".*" (WinHTTP|WinHttpRequest|Microsoft|Office|MSIE) ".*"

ignoreregex =