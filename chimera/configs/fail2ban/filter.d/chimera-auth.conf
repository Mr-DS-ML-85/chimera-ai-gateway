# Fail2Ban filter for Chimera auth brute force
# Catches login attempts and authentication abuse

[Definition]
# Normalize failed auth patterns
failregex = ^<HOST> - - \[.*?\] "(GET|POST|PUT|DELETE).*?(/login|/signin|/api/v1/auth/login|/auth).*" 401
           ^<HOST> - - \[.*?\] "(GET|POST|PUT|DELETE).*?(/login|/signin|/api/v1/auth/login|/auth).*" 403
           ^<HOST> - - \[.*?\] "POST /api/v1/auth/login.*" 401
           ^<HOST> - - \[.*?\] "POST /api/v1/auth/login.*" 403

# Ignorelines for benign failures
ignoreregex =