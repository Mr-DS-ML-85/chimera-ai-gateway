# Chimera Gateway Security Stack
# CrowdSec + Fail2Ban + Nginx Reverse Proxy
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.security.yml up -d
#
# Ports exposed:
#   80  -> Nginx (HTTP reverse proxy)
#   443 -> Nginx (HTTPS - self-signed cert)
#   8000 -> Direct gateway access (testing only)

networks:
  chimera_network:
    name: chimera_network
    driver: bridge

volumes:
  chimera_logs:
    name: chimera_logs
  crowdsec_data:
    name: crowdsec_data
  ssl_certs:
    name: ssl_certs

services:
  # ============================================================
  # Nginx Reverse Proxy (thin layer in front of gateway)
  # ============================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: chimera_nginx
    restart: unless-stopped
    networks:
      - chimera_network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./configs/nginx/conf.d:/etc/nginx/conf.d:ro
      - chimera_logs:/var/log/nginx
      - ssl_certs:/etc/nginx/ssl:ro
    environment:
      - NGINX_HOST=chimera.local
      - NGINX_PORT=80
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health", "||", "exit", "0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      gateway:
        condition: service_healthy
    cap_add:
      - NET_ADMIN
    # Required for Fail2Ban to see real IPs
    sysctls:
      - net.ipv4.conf.all.forwarding=1

  # ============================================================
  # Chimera Gateway (existing service - included for reference)
  # ============================================================
  gateway:
    image: chimera_gateway:latest
    container_name: chimera_gateway
    restart: unless-stopped
    networks:
      - chimera_network
    ports:
      - "8000:8000"  # Direct access for testing
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=info
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - ./data:/app/data
      - chimera_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy

  # ============================================================
  # Redis (existing service - included for reference)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: chimera_redis
    restart: unless-stopped
    networks:
      - chimera_network
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================
  # CrowdSec - Community-driven threat intelligence
  # ============================================================
  crowdsec:
    image: crowdsec/crowdsec:v1.5.4
    container_name: chimera_crowdsec
    restart: unless-stopped
    networks:
      - chimera_network
    ports:
      - "6060:6060"  # Local API
    volumes:
      - ./configs/crowdsec/acquis.yaml:/etc/crowdsec/config/acquis.yaml:ro
      - ./configs/crowdsec/profiles.yaml:/etc/crowdsec/config/profiles.yaml:ro
      - ./configs/crowdsec/crowdsec.yaml:/etc/crowdsec/config/crowdsec.yaml:ro
      - crowdsec_data:/var/lib/crowdsec/data
      - chimera_logs:/var/log/nginx:ro
    environment:
      - COLLECTIONS=crowdsecurity/http-logs crowdsecurity/nginx
      - BOUNCERS=crowdsec-firewall-bouncer
      - PARSERS=crowdsecurity/http-logs
      - SCENARIOS=crowdsecurity/http-crawl-non_statics crowdsecurity/http-probing
      - GID=1000
    env_file:
      - ./configs/crowdsec/.env
    # Share network namespace with nginx to apply bans
    network_mode: "service:nginx"
    depends_on:
      nginx:
        condition: service_started
    # CrowdSec needs to write to iptables - run with NET_ADMIN
    cap_add:
      - NET_ADMIN
      - NET_RAW
    healthcheck:
      test: ["CMD", "cscli", "metrics"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s
    # NOTE: When using network_mode: service:nginx, CrowdSec runs in nginx's network namespace
    # This allows direct iptables manipulation for banning IPs

  # ============================================================
  # CrowdSec Firewall Bouncer (applies bans via iptables)
  # ============================================================
  crowdsec-firewall-bouncer:
    image: crowdsecurity/firewall-bouncer:latest
    container_name: chimera_crowdsec_bouncer
    restart: unless-stopped
    networks:
      - chimera_network
    volumes:
      - crowdsec_data:/var/lib/crowdsec/data
      - /var/run/crowdsec:/var/run/crowdsec
      - ./configs/crowdsec/firewall-bouncer.yaml:/etc/crowdsec/firewall-bouncer.yaml:ro
    environment:
      - API_KEY=${CROWDSEC_API_KEY:-changeme}
      - API_URL=http://localhost:6060
      - BOUNCER_CONFIG_FW=/etc/crowdsec/firewall-bouncer.yaml
      - UPDATE_FREQUENCY=10s
      - LOG_LEVEL=info
    depends_on:
      crowdsec:
        condition: service_healthy
    network_mode: "service:nginx"
    cap_add:
      - NET_ADMIN
      - NET_RAW

  # ============================================================
  # Fail2Ban - Pattern-based abuse detection
  # ============================================================
  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: chimera_fail2ban
    restart: unless-stopped
    networks:
      - chimera_network
    # Fail2Ban needs host network access for iptables bans
    network_mode: host
    ports:
      - "9090:9090"  # Fail2Ban Web UI (optional)
    volumes:
      - ./configs/fail2ban/jail.local:/etc/fail2ban/jail.local:ro
      - ./configs/fail2ban/fail2ban.conf:/etc/fail2ban/fail2ban.conf:ro
      - ./configs/fail2ban/action.d:/etc/fail2ban/action.d:ro
      - ./configs/fail2ban/filter.d:/etc/fail2ban/filter.d:ro
      - chimera_logs:/var/log/nginx:ro
      - fail2ban_data:/var/lib/fail2ban
      - /var/log:/host/var/log:ro
      - /var/run:/host/var/run
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - F2B_DB_PURGE_AGE=14d
      - F2B_LOG_TARGET=STDOUT
      - F2B_LOG_LEVEL=INFO
      - F2B_LOCALE=en_US.UTF-8
      - TZ=UTC
    # Mount iptables for banning
    privileged: true
    depends_on:
      nginx:
        condition: service_started
    healthcheck:
      test: ["CMD", "fail2ban-client", "ping"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 30s

volumes:
  redis_data:
    name: chimera_redis_data
  fail2ban_data:
    name: chimera_fail2ban_data
